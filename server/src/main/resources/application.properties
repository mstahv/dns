spring.application.name=dns
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
# Run schema.sql before Hibernate ddl-auto so manual migrations (idempotent)
# are applied to existing databases (PostgreSQL etc.), not just embedded ones.
spring.sql.init.mode=always
vaadin.features.badgeComponent=true
